name: CI

on:
  push:
    branches: [dev, main]
    tags: ['v*']
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

# Run JavaScript-based actions on Node 24 ahead of GitHub forcing it on
# 2026-06-16, so we catch any incompatibility now rather than on the deadline.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one CI run per branch/PR at a time; newer pushes cancel older runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet restore Optimisarr.slnx
      # -warnaserror enforces the repo's zero-warnings standard (CLAUDE.md §6).
      - run: dotnet build Optimisarr.slnx --configuration Release --no-restore -warnaserror
      - run: python3 scripts/check_openapi.py --configuration Release --no-build
      - run: dotnet test Optimisarr.slnx --configuration Release --no-build

  frontend:
    name: Frontend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run check
        working-directory: web

  docs:
    name: Documentation and Compose validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python3 scripts/check_docs.py
      - run: |
          for file in compose*.example.yml; do
            RENDER_GID=107 docker compose -f "$file" config --quiet
          done

  docker:
    name: Docker image, smoke, and publish
    needs: [backend, frontend, docs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # Credentials are only needed (and only available) when we actually push.
      # Pull requests build the image to catch Dockerfile breakage but never push.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so Jellman86 -> jellman86.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image once
        run: |
          set -euo pipefail
          mapfile -t tags <<<"${{ steps.meta.outputs.tags }}"
          args=()
          for tag in "${tags[@]}"; do
            args+=(--tag "$tag")
          done
          docker build "${args[@]}" --build-arg "GIT_HASH=${{ github.sha }}" .

      - name: Smoke-test container readiness
        run: |
          first_tag="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)"
          bash scripts/ci_container_smoke.sh "$first_tag"

      - name: Push image tags
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            docker push "$tag"
          done <<<"${{ steps.meta.outputs.tags }}"
